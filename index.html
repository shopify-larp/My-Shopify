<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Shopify</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Zorgt voor de vloeiende overgang van de grafieklijnen */
        path { transition: d 0.6s ease-in-out, stroke 0.6s; }
    </style>
</head>
<body>
<div id="appBody">

<div id="settingsPage" class="settings-page">
    <div class="settings-header">
        <button id="closeSettings" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1>Store settings</h1>
        <div style="width:36px;"></div>
    </div>
    <div class="settings-content">
        <div class="settings-section">
            <h2 class="settings-section-title">STORE</h2>
            <div class="settings-field"><label>Store name</label><input id="cfgStoreName" type="text" placeholder="larpmax"></div>
            <div class="settings-field"><label>Logo text</label><input id="cfgLogoText" type="text" placeholder="lar" maxlength="4"></div>
            <div class="settings-field"><label>Avatar initials</label><input id="cfgAvatar" type="text" placeholder="LM" maxlength="3"></div>
        </div>
        <div class="settings-section">
            <h2 class="settings-section-title">STATS</h2>
            <div class="settings-field"><label>Total sales ($)</label><input id="cfgSales" type="text" placeholder="1,169.61"></div>
            <div class="settings-field"><label>Orders</label><input id="cfgOrders" type="text" placeholder="103"></div>
        </div>
        <button id="saveSettings" class="save-btn">Save</button>
    </div>
</div>

<div id="mainPage">
    <header class="app-header">
        <div class="header-left">
            <button id="logoCircle" class="logo-tile" onclick="document.getElementById('logoUpload').click();">
                <span id="logoText">lar</span>
            </button>
            <input type="file" id="logoUpload" style="display: none;" accept="image/*" onchange="updateLogo(this)">
            <span id="storeNameDisplay" class="store-name">larpify</span>
        </div>
        <div class="header-right">
            <button id="openSettings" class="bell-btn">
                <svg viewBox="0 0 18 18" fill="currentColor"><path d="m5.252 12.424-2.446-.281c-1.855-.213-2.38-2.659-.778-3.616l.065-.038a2.89 2.89 0 0 0 1.407-2.48v-.509a4.5 4.5 0 0 1 9 0v.51c0 1.016.535 1.958 1.408 2.479l.065.038c1.602.957 1.076 3.403-.778 3.616l-2.543.292v.365a2.7 2.7 0 0 1-5.4 0zm3.9.076h-2.4v.3a1.2 1.2 0 1 0 2.4 0zm-3.152-1.5h4l3.024-.348a.452.452 0 0 0 .18-.837l-.065-.038a4.4 4.4 0 0 1-.674-.495l-.073-.067a4.4 4.4 0 0 1-1.392-3.205v-.51a3 3 0 1 0-6 0v.51a4.4 4.4 0 0 1-1.391 3.205l-.073.067a4.6 4.6 0 0 1-.674.495l-.065.038a.453.453 0 0 0 .18.838z"></path></svg>
            </button>
            <div class="avatar-circle"><span id="avatarInitials">EC</span></div>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="filter-row">
            <button class="filter-btn">Last 12 hours <span class="chevron">▾</span></button>
            <button class="live-btn"><span class="live-dot"></span><span id="dispVisitors">23</span></button>
            <button class="report-btn" id="generateReport">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" width="14"><path d="M7.018 1.5h1.964c.813 0 1.469 0 2 .043.546.045 1.026.14 1.47.366.706.36 1.28.933 1.64 1.639.226.444.32.924.365 1.47.043.531.043 1.187.043 2v.232a.75.75 0 0 1-1.5 0v-.2c0-.852 0-1.447-.038-1.91-.037-.453-.107-.714-.207-.911a2.25 2.25 0 0 0-.984-.984c-.197-.1-.458-.17-.912-.207-.462-.037-1.057-.038-1.909-.038h-1.9c-.852 0-1.447 0-1.91.038-.453.037-.714.107-.911.207a2.25 2.25 0 0 0-.984.984c-.1.197-.17.458-.207.912-.037.462-.038 1.057-.038 1.909v1.9c0 .852 0 1.447.038 1.91.037.453.107.714.207.912.216.423.56.767.984.983.197.1.458.17.912.207.462.037 1.057.038 1.909.038h.2a.75.75 0 0 1 0 1.5h-.232c-.813 0-1.469 0-2-.043-.546-.045-1.026-.14-1.47-.366a3.76 3.76 0 0 1-1.64-1.638c-.226-.445-.32-.925-.365-1.471-.043-.531-.043-1.187-.043-2v-1.964c0-.813 0-1.469.043-2 .045-.546.14-1.026.366-1.47.36-.706.933-1.28 1.639-1.64.444-.226.924-.32 1.47-.365.531-.043 1.187-.043 2-.043"></path></svg>
                Report
            </button>
        </div>

        <div class="stats-row">
            <div class="stat-col">
                <div class="stat-label">Total sales</div>
                <div class="stat-val" id="col0val">$1,169.61</div>
            </div>
            <div class="stat-col center">
                <div class="stat-label">Orders</div>
                <div class="stat-val muted" id="col1val">103</div>
            </div>
            <div class="stat-col right">
                <div class="stat-label">Sessions</div>
                <div class="stat-val muted" id="col2val">4,120</div>
            </div>
        </div>

        <div class="chart-area" id="mainChart">
            <svg viewBox="0 0 400 175" width="100%" height="175" xmlns="http://www.w3.org/2000/svg">
                <line x1="36" y1="10" x2="394" y2="10" stroke="#eeeeef" stroke-width="1"></line>
                <line x1="36" y1="72" x2="394" y2="72" stroke="#eeeeef" stroke-width="1"></line>
                <line x1="36" y1="133" x2="394" y2="133" stroke="#eeeeef" stroke-width="1"></line>
                <text text-anchor="end" x="32" y="14" fill="#9ca3af" font-size="11">$1K</text>
                <text text-anchor="end" x="32" y="76" fill="#9ca3af" font-size="11">$500</text>
                <text text-anchor="end" x="32" y="137" fill="#9ca3af" font-size="11">$0</text>
                
                <path id="pathCompare" d="M36,90 C70,80 110,120 150,90 C190,60 230,100 270,80 C310,60 350,90 394,70" fill="none" stroke="#c8d4e0" stroke-width="1.8" stroke-dasharray="5,4" stroke-linecap="round"></path>
                <path id="pathMain" d="M36,120 C70,100 110,40 150,60 C190,80 230,20 270,50 C310,80 350,30 394,60" fill="none" stroke="#13ACF0" stroke-width="2.2" stroke-linecap="round"></path>
            </svg>
        </div>

        <div class="action-section">
            <div class="action-grid">
                <div class="action-box">
                    <span id="actionFulfill" class="action-num">4</span>
                    <p class="action-label">Orders to fulfill</p>
                </div>
                <div class="action-box">
                    <span id="actionPayments" class="action-num">8</span>
                    <p class="action-label">Payments to capture</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-center-pill">
            <button class="nav-btn active"><svg viewBox="0 0 16 16" fill="currentColor" width="20"><path d="M12 14h-2a1 1 0 0 1-1-1v-2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v2.5a1 1 0 0 1-1 1h-2a2 2 0 0 1-2-2v-4.257c0-.796.316-1.56.879-2.122l3.707-3.707c.78-.78 2.047-.78 2.828 0l3.707 3.707a3 3 0 0 1 .879 2.122v4.257a2 2 0 0 1-2 2"></path></svg></button>
            <button class="nav-btn"><svg viewBox="0 0 16 16" fill="currentColor" width="20"><path d="M1 8a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5h-12.5a.75.75 0 0 1-.75-.75z"></path></svg></button>
            <button class="nav-btn nav-btn-menu"><svg viewBox="0 0 16 16" fill="currentColor" width="20"><path d="M1 2.75h14M1 8h14M1 13.25h14" stroke="currentColor" stroke-width="1.5"></path></svg></button>
        </div>
    </nav>
</div>

<script>
// --- SETTINGS LOGICA ---
const openBtn = document.getElementById('openSettings');
const closeBtn = document.getElementById('closeSettings');
const saveBtn = document.getElementById('saveSettings');
const settingsPage = document.getElementById('settingsPage');

openBtn.onclick = () => settingsPage.classList.add('active');
closeBtn.onclick = () => settingsPage.classList.remove('active');

saveBtn.onclick = () => {
    if(document.getElementById('cfgStoreName').value) 
        document.getElementById('storeNameDisplay').innerText = document.getElementById('cfgStoreName').value;
    if(document.getElementById('cfgLogoText').value) 
        document.getElementById('logoText').innerText = document.getElementById('cfgLogoText').value;
    if(document.getElementById('cfgAvatar').value) 
        document.getElementById('avatarInitials').innerText = document.getElementById('cfgAvatar').value;
    if(document.getElementById('cfgSales').value) 
        document.getElementById('col0val').innerText = '$' + document.getElementById('cfgSales').value;
    
    settingsPage.classList.remove('active');
};

// --- LOGO UPLOAD ---
function updateLogo(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var logoCircle = document.getElementById('logoCircle');
            logoCircle.style.backgroundImage = "url('" + e.target.result + "')";
            logoCircle.style.backgroundSize = "cover";
            document.getElementById('logoText').style.opacity = "0";
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// --- SMOOTH REPORT GENERATOR ---
function generateSmoothPath() {
    let points = [];
    for (let i = 0; i < 7; i++) {
        points.push({
            x: 36 + (i * 60),
            y: 20 + Math.random() * 100
        });
    }
    // Maak een 'C' (Curved) path string
    let d = `M${points[0].x},${points[0].y}`;
    for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i];
        const p1 = points[i+1];
        const cp1x = p0.x + (p1.x - p0.x) / 2;
        d += ` C${cp1x},${p0.y} ${cp1x},${p1.y} ${p1.x},${p1.y}`;
    }
    return d;
}

document.getElementById('generateReport').onclick = function() {
    // 1. Update de lijnen met een vloeiende transitie
    document.getElementById('pathMain').setAttribute('d', generateSmoothPath());
    document.getElementById('pathCompare').setAttribute('d', generateSmoothPath());

    // 2. Update de getallen (willekeurig voor het effect)
    const newVal = (Math.random() * 2000 + 500).toLocaleString('en-US', {minimumFractionDigits: 2});
    document.getElementById('col0val').innerText = '$' + newVal;
    document.getElementById('col1val').innerText = Math.floor(Math.random() * 150);
};
</script>

</body>
</html>
