<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Shopify</title>
    <meta name="description" content="Pixel-perfect Shopify analytics dashboard simulator.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="shopify_icon.png">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="appBody">

<div id="settingsPage" class="settings-page">
    <div class="settings-header">
        <button id="closeSettings" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1>Store settings</h1>
        <div style="width:36px;"></div>
    </div>
    <div class="settings-content">
        <div class="settings-section">
            <h2 class="settings-section-title">STORE</h2>
            <div class="settings-field">
                <label>Store name</label>
                <input id="cfgStoreName" type="text" placeholder="larpmax">
            </div>
            <div class="settings-field">
                <label>Logo text</label>
                <input id="cfgLogoText" type="text" placeholder="lar" maxlength="4">
            </div>
            <div class="settings-field">
                <label>Avatar initials</label>
                <input id="cfgAvatar" type="text" placeholder="LM" maxlength="3">
            </div>
        </div>

        <div class="settings-section">
            <h2 class="settings-section-title">STATS</h2>
            <div class="settings-field">
                <label>Total sales ($)</label>
                <input id="cfgSales" type="text" placeholder="1,169.61">
            </div>
            <div class="settings-field">
                <label>Gross sales ($)</label>
                <input id="cfgGross" type="text" placeholder="1,254.50">
            </div>
            <div class="settings-field">
                <label>Orders</label>
                <input id="cfgOrders" type="text" placeholder="103">
            </div>
            <div class="settings-field">
                <label>Conversion rate (%)</label>
                <input id="cfgConv" type="text" placeholder="0,3">
            </div>
            <div class="settings-field">
                <label>Active visitors on site</label>
                <input id="cfgVisitors" type="text" placeholder="23">
            </div>
            <div class="settings-field">
                <label>Orders to fulfill</label>
                <input id="cfgFulfill" type="text" placeholder="4">
            </div>
            <div class="settings-field">
                <label>Payments to capture</label>
                <input id="cfgPayments" type="text" placeholder="8">
            </div>
        </div>

        <div class="settings-section">
            <h2 class="settings-section-title">PUSH NOTIFICATION</h2>
            <button id="pushNotif" class="push-btn">Send notification</button>
        </div>

        <button id="saveSettings" class="save-btn">Save</button>
    </div>
</div>

<div id="mainPage">
    <header class="app-header">
        <div class="header-left">
            <button id="logoCircle" class="logo-tile" onclick="document.getElementById('logoUpload').click();">
                <span id="logoText">lar</span>
            </button>
            <input type="file" id="logoUpload" style="display: none;" accept="image/*" onchange="updateLogo(this)">
            <span id="storeNameDisplay" class="store-name">larpify</span>
        </div>
        <div class="header-right">
            <button id="openSettings" class="bell-btn">
                <svg viewBox="0 0 18 18" fill="currentColor"><path fill-rule="evenodd" d="m5.252 12.424-2.446-.281c-1.855-.213-2.38-2.659-.778-3.616l.065-.038a2.89 2.89 0 0 0 1.407-2.48v-.509a4.5 4.5 0 0 1 9 0v.51c0 1.016.535 1.958 1.408 2.479l.065.038c1.602.957 1.076 3.403-.778 3.616l-2.543.292v.365a2.7 2.7 0 0 1-5.4 0zm3.9.076h-2.4v.3a1.2 1.2 0 1 0 2.4 0zm-3.152-1.5h4l3.024-.348a.452.452 0 0 0 .18-.837l-.065-.038a4.4 4.4 0 0 1-.674-.495l-.073-.067a4.4 4.4 0 0 1-1.392-3.205v-.51a3 3 0 1 0-6 0v.51a4.4 4.4 0 0 1-1.391 3.205l-.073.067a4.6 4.6 0 0 1-.674.495l-.065.038a.453.453 0 0 0 .18.838z"></path></svg>
            </button>
            <div class="avatar-circle">
                <span id="avatarInitials">EC</span>
            </div>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="filter-row">
            <button class="filter-btn">Last 12 hours <span>▾</span></button>
            <button class="live-btn">
                <span class="live-dot"></span><span id="dispVisitors">192</span>
            </button>
            <button class="report-btn" onclick="generateReport()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M7.018 1.5h1.964c.813 0 1.469 0 2 .043.546.045 1.026.14 1.47.366.706.36 1.28.933 1.64 1.639.226.444.32.924.365 1.47.043.531.043 1.187.043 2v.232a.75.75 0 0 1-1.5 0v-.2c0-.852 0-1.447-.038-1.91-.037-.453-.107-.714-.207-.911a2.25 2.25 0 0 0-.984-.984c-.197-.1-.458-.17-.912-.207-.462-.037-1.057-.038-1.909-.038h-1.9c-.852 0-1.447 0-1.91.038-.453.037-.714.107-.911.207a2.25 2.25 0 0 0-.984.984c-.1.197-.17.458-.207.912-.037.462-.038 1.057-.038 1.909v1.9c0 .852 0 1.447.038 1.91.037.453.107.714.207.912.216.423.56.767.984.983.197.1.458.17.912.207.462.037 1.057.038 1.909.038h.2a.75.75 0 0 1 0 1.5h-.232c-.813 0-1.469 0-2-.043-.546-.045-1.026-.14-1.47-.366a3.76 3.76 0 0 1-1.64-1.638c-.226-.445-.32-.925-.365-1.471-.043-.531-.043-1.187-.043-2v-1.964c0-.813 0-1.469.043-2 .045-.546.14-1.026.366-1.47.36-.706.933-1.28 1.639-1.64.444-.226.924-.32 1.47-.365.531-.043 1.187-.043 2-.043"></path><path fill-rule="evenodd" d="M8.25 11a2.75 2.75 0 1 1 5.152 1.34l1.128 1.13a.749.749 0 1 1-1.06 1.06l-1.13-1.128a2.75 2.75 0 0 1-4.09-2.402m2.75-1.25a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5"></path><path d="M5 5.75a.75.75 0 0 1 .75-.75h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1-.75-.75"></path><path d="M5.75 8a.75.75 0 0 0 0 1.5h1.5a.75.75 0 0 0 0-1.5z"></path></svg>
                Report
            </button>
        </div>

        <div id="metricsViewport">
            <div id="panelA">
                <div class="stats-row">
                    <div class="stat-col">
                        <div class="stat-label">Total sales</div>
                        <div class="stat-val">$<span id="salesValue">1,169.61</span></div>
                    </div>
                    <div class="stat-col center">
                        <div class="stat-label">Orders</div>
                        <div class="stat-val muted" id="ordersValue">2</div>
                    </div>
                    <div class="stat-col right">
                        <div class="stat-label">Conversion</div>
                        <div class="stat-val muted"><span id="conversionValue">0</span>%</div>
                    </div>
                </div>
                <div class="chart-area" id="chartAreaA"></div>
            </div>
            
            <div id="chartPool" style="display:none">
                <svg id="chart0" viewBox="0 0 400 175" width="100%" height="175" xmlns="http://www.w3.org/2000/svg">
                    <line x1="36" y1="10" x2="394" y2="10" stroke="#eeeeef" stroke-width="1"></line>
                    <line x1="36" y1="72" x2="394" y2="72" stroke="#eeeeef" stroke-width="1"></line>
                    <line x1="36" y1="133" x2="394" y2="133" stroke="#eeeeef" stroke-width="1"></line>
                    <path d="M36,65 C50,65 56,25 68,25 C80,25 96,96 110,96" fill="none" stroke="#13ACF0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
        </div>

        <div class="action-section">
            <div class="action-grid">
                <div class="action-box">
                    <svg class="action-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"><path fill-rule="evenodd" d="M6.976 3.5a2.75 2.75 0 0 0-2.72 2.347l-.662 4.46a8.75 8.75 0 0 0-.094 1.282v1.661a3.25 3.25 0 0 0 3.25 3.25h6.5a3.25 3.25 0 0 0 3.25-3.25v-1.66c0-.43-.032-.858-.095-1.283l-.66-4.46a2.75 2.75 0 0 0-2.72-2.347h-6.05zM5.739 6.067A1.25 1.25 0 0 1 6.976 5h6.048c.62 0 1.146.454 1.237 1.067L14.844 10H12.36a1.25 1.25 0 0 0-1.185.855l-.159.474a.25.25 0 0 1-.237.171H9.221a.25.25 0 0 1-.237-.17l-.159-.475A1.25 1.25 0 0 0 7.64 10H5.156l.583-3.933zM5.001 11.5 5 11.59v1.66c0 .966.784 1.75 1.75 1.75h6.5A1.75 1.75 0 0 0 15 13.25V11.5h-2.46l-.1.303A1.75 1.75 0 0 1 10.78 13H9.22a1.75 1.75 0 0 1-1.66-1.197l-.1-.303H5z" fill="#5C5F62"></path></svg>
                    <span id="actionFulfill" class="action-num">2</span>
                    <p class="action-label">Orders to fulfill</p>
                </div>
                <div class="action-box">
                    <svg class="action-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"><path fill-rule="evenodd" d="M9.621 4h5.258c.395 0 .736 0 1.017.023.297.024.592.078.875.222.424.216.768.56.984.984.144.283.198.578.222.875.023.28.023.622.023 1.017v2.258c0 .395 0 .736-.023 1.017a2.29 2.29 0 0 1-.222.875 2.25 2.25 0 0 1-.983.984c-.284.144-.58.198-.876.222-.28.023-.622.023-1.017.023h-2.58a1.92 1.92 0 0 1-.265.23l-2.73 1.964c-.565.408-.93.67-1.335.86a4.77 4.77 0 0 1-1.125.363C6.404 16 5.955 16 5.258 16H3.75a.75.75 0 0 1 0-1.5h1.436c.794 0 1.095-.004 1.379-.057.266-.05.524-.134.77-.249.261-.122.508-.295 1.152-.76l2.67-1.922a.423.423 0 0 0-.35-.754l-4.875 1.22a.75.75 0 0 1-.364-1.456l.932-.233V8c-.59.002-.821.012-1.033.062a2.25 2.25 0 0 0-.65.27c-.21.128-.398.31-.943.854l-.594.594a.75.75 0 1 1-1.06-1.06l.654-.655c.46-.46.78-.78 1.16-1.012a3.75 3.75 0 0 1 1.083-.45c.397-.095.813-.102 1.387-.103.003-.143.009-.275.019-.396a2.29 2.29 0 0 1 .222-.875 2.25 2.25 0 0 1 .984-.984 2.29 2.29 0 0 1 .875-.222C8.884 4 9.226 4 9.621 4zm5.229 7h-2.024a1.923 1.923 0 0 0-2.382-1.697L8 9.914V8.5h8.5v.85c0 .432 0 .712-.018.924-.017.204-.045.28-.064.317a.75.75 0 0 1-.328.327c-.037.02-.112.047-.316.064-.212.017-.492.018-.924.018zm1.645-4.5h-8.49c.002-.104.006-.194.013-.274.017-.204.045-.28.064-.316a.75.75 0 0 1 .328-.328c.037-.02.112-.047.316-.064.212-.017.492-.018.924-.018h5.2c.432 0 .712 0 .924.018.204.017.28.045.316.064a.75.75 0 0 1 .328.328c.02.037.047.112.064.316.007.08.01.17.013.274z" fill="#5C5F62"></path></svg>
                    <span id="actionPayments" class="action-num">1</span>
                    <p class="action-label">Payment to capture</p>
                </div>
            </div>
        </div>
        <div style="height:110px;"></div>
    </div>
</div>
</div>

<script src="wallet.js"></script>
<script>
// --- FUNCTIE VOOR HET RAPPORT (RANDOMIZEN) ---
function generateReport() {
    // 1. Getallen Randomizen
    const salesNum = (Math.random() * (5000 - 500) + 500);
    document.getElementById('salesValue').innerText = salesNum.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('ordersValue').innerText = Math.floor(Math.random() * 20 + 1);
    document.getElementById('conversionValue').innerText = (Math.random() * 4).toFixed(1);
    document.getElementById('dispVisitors').innerText = Math.floor(Math.random() * 300 + 10);
    document.getElementById('actionFulfill').innerText = Math.floor(Math.random() * 10);
    document.getElementById('actionPayments').innerText = Math.floor(Math.random() * 5);

    // 2. Grafieken Randomizen (SVG Paden)
    const svgs = document.querySelectorAll('svg[id^="chart"]');
    svgs.forEach(svg => {
        const paths = svg.querySelectorAll('path');
        paths.forEach(path => {
            let newD = "M36," + (Math.random() * 100 + 30);
            for (let x = 80; x <= 394; x += 50) {
                let y = Math.random() * 100 + 20;
                newD += ` C${x-25},${y} ${x-10},${y} ${x},${y}`;
            }
            path.setAttribute('d', newD);
        });
    });
    
    // Optioneel: visuele feedback dat er "geladen" wordt
    const btn = document.querySelector('.report-btn');
    btn.style.opacity = '0.5';
    setTimeout(() => btn.style.opacity = '1', 300);
}

// --- LOGO UPDATE FUNCTIE ---
function updateLogo(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var logoCircle = document.getElementById('logoCircle');
            var logoText = document.getElementById('logoText');
            logoCircle.style.backgroundImage = "url('" + e.target.result + "')";
            logoCircle.style.backgroundSize = "cover";
            logoCircle.style.backgroundPosition = "center";
            logoText.style.opacity = "0"; 
            logoCircle.style.backgroundColor = "transparent";
            logoCircle.style.border = "none";
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>
